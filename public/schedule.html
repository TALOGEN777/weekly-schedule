<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleanroom Production Schedule</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2canvas for JPG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Custom scrollbar styles */
        .overflow-x-auto::-webkit-scrollbar {
            height: 8px;
        }
        .overflow-x-auto::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Calendar, 
            ChevronLeft, 
            ChevronRight, 
            Clock, 
            Users, 
            FlaskConical, 
            Box, 
            Plus, 
            Trash2, 
            Save, 
            X, 
            PlusCircle, 
            Image as ImageIcon,
            Pencil
        } from 'https://esm.sh/lucide-react@0.294.0';

        // --- Utility Functions ---

        const formatDate = (date) => {
            return date.toISOString().split('T')[0];
        };

        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            d.setDate(diff);
            d.setHours(0, 0, 0, 0);
            return d;
        };

        const getCurrentWeekStart = () => {
            return getStartOfWeek(new Date());
        };

        const getDaysOfWeek = (startDate) => {
            const days = [];
            // Get 5 working days (Mon-Fri) starting from Sunday + 1
            for (let i = 1; i <= 5; i++) {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                days.push(d);
            }
            return days;
        };

        const formatDisplayDate = (date) => {
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        };

        const getDayName = (date) => {
            return date.toLocaleDateString('en-US', { weekday: 'long' });
        };

        // --- Components ---

        const ScheduleCell = ({ 
            data, 
            onClick, 
            rowId,
            dateStr,
            onDragStart,
            onDrop,
            onDragOver,
            onDragEnter,
            onDragLeave,
            isDragOver
        }) => {
            // Empty Cell
            if (!data) {
                return (
                    <div 
                        onClick={onClick}
                        onDrop={(e) => onDrop(e, rowId, dateStr)}
                        onDragOver={onDragOver}
                        onDragEnter={(e) => onDragEnter(e, rowId, dateStr)}
                        onDragLeave={onDragLeave}
                        className={`h-full min-h-[140px] p-2 border-r border-b border-gray-200 cursor-pointer transition-colors 
                            ${isDragOver ? 'bg-blue-200 ring-2 ring-blue-400 ring-inset' : 'bg-white hover:bg-gray-50'}`}
                    >
                        <div className="h-full flex items-center justify-center opacity-0 hover:opacity-100">
                            <Plus className="text-blue-400 w-6 h-6" />
                        </div>
                    </div>
                );
            }

            const isCocoon = data.process?.toLowerCase().includes('cocoon');
            
            // Occupied Cell
            return (
                <div 
                    draggable="true"
                    onDragStart={(e) => onDragStart(e, rowId, dateStr)}
                    onDrop={(e) => onDrop(e, rowId, dateStr)}
                    onDragOver={onDragOver}
                    onDragEnter={(e) => onDragEnter(e, rowId, dateStr)}
                    onDragLeave={onDragLeave}
                    onClick={onClick}
                    className={`h-full min-h-[140px] p-3 border-r border-b border-gray-200 cursor-grab active:cursor-grabbing transition-all relative group 
                        ${isDragOver ? 'bg-blue-200 ring-2 ring-blue-400 ring-inset' : isCocoon ? 'bg-purple-50 hover:bg-purple-100' : 'bg-white hover:bg-blue-50'}`}
                >
                    {/* Centered Content */}
                    <div className="flex flex-col gap-2 items-center text-center h-full">
                        {/* Header: Process & Time */}
                        <div className="flex flex-col items-center gap-1 w-full">
                            <div>
                                <span className={`text-xs font-bold uppercase px-2 py-0.5 rounded-md ${isCocoon ? 'bg-purple-200 text-purple-800' : 'bg-blue-200 text-blue-800'}`}>
                                    {data.process || 'N/A'}
                                </span>
                            </div>
                            <div className="text-xs text-gray-500 font-mono">{data.batch}</div>
                            
                            <div className="flex items-center text-xs text-gray-600 font-medium mt-1">
                                <Clock className="w-3 h-3 mr-1" />
                                {data.startTime}-{data.endTime}
                            </div>
                        </div>

                        {/* Separator */}
                        <div className="border-t border-gray-200 my-1 w-full"></div>

                        {/* Details */}
                        <div className="space-y-1 flex flex-col items-center w-full">
                            {data.employees && (
                                <div className="flex items-center justify-center text-xs text-gray-700">
                                    <Users className="w-3 h-3 mr-1.5 text-gray-400 shrink-0" />
                                    <span className="leading-tight">{data.employees}</span>
                                </div>
                            )}
                            
                            <div className="flex gap-2 flex-wrap justify-center mt-1">
                                {data.incubator && (
                                    <div className="flex items-center text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded border border-amber-200">
                                        <Box className="w-3 h-3 mr-1" />
                                        Inc #{data.incubator}
                                    </div>
                                )}
                                
                                {data.hood && (
                                    <div className="flex items-center text-[10px] bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded border border-emerald-200">
                                        <FlaskConical className="w-3 h-3 mr-1" />
                                        BSC #{data.hood}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RowModal = ({ isOpen, onClose, onSave, onDelete, initialLabel = '', mode = 'add' }) => {
            const [label, setLabel] = useState(initialLabel);

            useEffect(() => {
                setLabel(initialLabel);
            }, [initialLabel, isOpen]);

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                if (label.trim()) {
                    onSave(label);
                    setLabel('');
                }
            };

            const title = mode === 'add' ? 'Add New Line/Room' : 'Edit Line/Room Name';
            const buttonText = mode === 'add' ? 'Add Line' : 'Update Name';

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-sm overflow-hidden">
                        <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h3 className="text-lg font-semibold text-gray-800">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                <X className="w-5 h-5" />
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6">
                            <label className="block text-sm font-medium text-gray-700 mb-2">Room Name / Line Label</label>
                            <input 
                                type="text" 
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                placeholder="e.g. Room 32 (Line A)"
                                value={label}
                                onChange={(e) => setLabel(e.target.value)}
                                autoFocus
                            />
                            <div className={`mt-6 flex ${mode === 'edit' ? 'justify-between' : 'justify-end'} gap-2`}>
                                {mode === 'edit' && (
                                    <button 
                                        type="button" 
                                        onClick={onDelete}
                                        className="px-4 py-2 border border-red-200 text-red-600 rounded-md text-sm font-medium hover:bg-red-50 flex items-center transition-colors"
                                    >
                                        <Trash2 className="w-4 h-4 mr-2" />
                                        Delete Line
                                    </button>
                                )}
                                <div className="flex gap-2">
                                    <button type="button" onClick={onClose} className="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                                        Cancel
                                    </button>
                                    <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition-colors">
                                        {buttonText}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const EditModal = ({ isOpen, onClose, onSave, onDelete, initialData, dateLabel, roomLabel }) => {
            const [formData, setFormData] = useState({
                process: '',
                batch: '',
                startTime: '08:00',
                endTime: '12:00',
                employees: '',
                incubator: '',
                hood: ''
            });

            useEffect(() => {
                if (isOpen) {
                    if (initialData) {
                        setFormData(initialData);
                    } else {
                        setFormData({
                            process: '',
                            batch: '',
                            startTime: '08:00',
                            endTime: '12:00',
                            employees: '',
                            incubator: '',
                            hood: ''
                        });
                    }
                }
            }, [isOpen, initialData]);

            if (!isOpen) return null;

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
                        <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <div>
                                <h3 className="text-lg font-semibold text-gray-800">Edit Schedule</h3>
                                <p className="text-sm text-gray-500">{roomLabel} • {dateLabel}</p>
                            </div>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors">
                                <X className="w-6 h-6" />
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Process Name</label>
                                    <input 
                                        name="process"
                                        type="text" 
                                        placeholder="e.g. Manual"
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                        value={formData.process}
                                        onChange={handleChange}
                                        autoFocus
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Batch Number</label>
                                    <input 
                                        name="batch"
                                        type="text" 
                                        placeholder="2502..."
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm font-mono"
                                        value={formData.batch}
                                        onChange={handleChange}
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Start Time</label>
                                    <input 
                                        name="startTime"
                                        type="time" 
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                        value={formData.startTime}
                                        onChange={handleChange}
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">End Time</label>
                                    <input 
                                        name="endTime"
                                        type="time" 
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                        value={formData.endTime}
                                        onChange={handleChange}
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-medium text-gray-700 mb-1">Employees (Names)</label>
                                <div className="relative">
                                    <Users className="absolute left-3 top-2.5 w-4 h-4 text-gray-400" />
                                    <input 
                                        name="employees"
                                        type="text" 
                                        placeholder="Dutchi/Moria"
                                        className="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                        value={formData.employees}
                                        onChange={handleChange}
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Incubator #</label>
                                    <div className="relative">
                                        <Box className="absolute left-3 top-2.5 w-4 h-4 text-gray-400" />
                                        <input 
                                            name="incubator"
                                            type="text" 
                                            placeholder="20"
                                            className="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                            value={formData.incubator}
                                            onChange={handleChange}
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">BSC / Hood #</label>
                                    <div className="relative">
                                        <FlaskConical className="absolute left-3 top-2.5 w-4 h-4 text-gray-400" />
                                        <input 
                                            name="hood"
                                            type="text" 
                                            placeholder="05"
                                            className="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm"
                                            value={formData.hood}
                                            onChange={handleChange}
                                        />
                                    </div>
                                </div>
                            </div>

                            <div className="flex justify-between items-center pt-4 border-t border-gray-100 mt-2">
                                {initialData ? (
                                    <button 
                                        type="button"
                                        onClick={onDelete}
                                        className="flex items-center text-red-600 hover:text-red-700 text-sm font-medium px-3 py-2 rounded-md hover:bg-red-50 transition-colors"
                                    >
                                        <Trash2 className="w-4 h-4 mr-2" />
                                        Delete
                                    </button>
                                ) : <div></div>}
                                
                                <div className="flex gap-2">
                                    <button 
                                        type="button"
                                        onClick={onClose}
                                        className="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        type="submit"
                                        className="px-4 py-2 bg-blue-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex items-center shadow-sm"
                                    >
                                        <Save className="w-4 h-4 mr-2" />
                                        Save Entry
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        function App() {
            // Initialize with current week based on system date
            const [currentDate, setCurrentDate] = useState(() => getCurrentWeekStart());
            const [scheduleData, setScheduleData] = useState({});
            const [rows, setRows] = useState([]); 
            const [modalState, setModalState] = useState({ isOpen: false, rowId: null, dateStr: null });
            
            // Row Modal State (Add or Edit)
            const [rowModalState, setRowModalState] = useState({
                isOpen: false,
                mode: 'add',
                rowId: null,
                initialLabel: ''
            });

            const [dragOverCell, setDragOverCell] = useState(null);

            // Navigation
            const handlePrevWeek = () => {
                const newDate = new Date(currentDate);
                newDate.setDate(currentDate.getDate() - 7);
                setCurrentDate(newDate);
            };

            const handleNextWeek = () => {
                const newDate = new Date(currentDate);
                newDate.setDate(currentDate.getDate() + 7);
                setCurrentDate(newDate);
            };

            const handleToday = () => {
                setCurrentDate(getCurrentWeekStart());
            };

            // Row Management
            const handleOpenAddRow = () => {
                setRowModalState({
                    isOpen: true,
                    mode: 'add',
                    rowId: null,
                    initialLabel: ''
                });
            };

            const handleOpenEditRow = (e, row) => {
                e.stopPropagation();
                setRowModalState({
                    isOpen: true,
                    mode: 'edit',
                    rowId: row.id,
                    initialLabel: row.label
                });
            };

            const handleSaveRow = (label) => {
                if (rowModalState.mode === 'add') {
                    const newRow = {
                        id: `row-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                        label: label,
                        name: label
                    };
                    setRows(prev => [...prev, newRow]);
                } else if (rowModalState.mode === 'edit' && rowModalState.rowId) {
                    setRows(prev => prev.map(row => 
                        row.id === rowModalState.rowId 
                            ? { ...row, label: label, name: label }
                            : row
                    ));
                }
                setRowModalState(prev => ({ ...prev, isOpen: false }));
            };

            const handleDeleteRow = () => {
                const rowId = rowModalState.rowId;
                if (!rowId) return;

                if (window.confirm('Are you absolutely sure you want to delete this line and all its scheduled events?')) {
                    setRows(prev => prev.filter(r => r.id !== rowId));
                    setScheduleData(prev => {
                        const newData = { ...prev };
                        Object.keys(newData).forEach(key => {
                            if (key.startsWith(`${rowId}_`)) {
                                delete newData[key];
                            }
                        });
                        return newData;
                    });
                    setRowModalState(prev => ({ ...prev, isOpen: false }));
                }
            };

            // Data Management
            const handleCellClick = (rowId, dateStr) => {
                setModalState({
                    isOpen: true,
                    rowId,
                    dateStr
                });
            };

            const handleSaveEntry = (data) => {
                const { rowId, dateStr } = modalState;
                const key = `${rowId}_${dateStr}`;
                setScheduleData(prev => ({
                    ...prev,
                    [key]: data
                }));
                setModalState({ isOpen: false, rowId: null, dateStr: null });
            };

            const handleDeleteEntry = () => {
                const { rowId, dateStr } = modalState;
                const key = `${rowId}_${dateStr}`;
                setScheduleData(prev => {
                    const newData = { ...prev };
                    delete newData[key];
                    return newData;
                });
                setModalState({ isOpen: false, rowId: null, dateStr: null });
            };

            // --- Drag and Drop Handlers ---
            const handleDragStart = useCallback((e, rowId, dateStr) => {
                const sourceData = { rowId, dateStr };
                e.dataTransfer.setData("application/json", JSON.stringify(sourceData));
                e.dataTransfer.effectAllowed = "copy";
            }, []);

            const handleDragOver = useCallback((e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            }, []);

            const handleDragEnter = useCallback((e, rowId, dateStr) => {
                e.preventDefault();
                setDragOverCell({ rowId, dateStr });
            }, []);

            const handleDragLeave = useCallback(() => {
                // Optional: could add logic to only clear if leaving the cell completely
            }, []);

            const handleDrop = useCallback((e, targetRowId, targetDateStr) => {
                e.preventDefault();
                setDragOverCell(null);

                const dataStr = e.dataTransfer.getData("application/json");
                if (!dataStr) return;

                try {
                    const source = JSON.parse(dataStr);
                    const sourceKey = `${source.rowId}_${source.dateStr}`;
                    const targetKey = `${targetRowId}_${targetDateStr}`;
                    
                    const sourceData = scheduleData[sourceKey];

                    if (sourceData) {
                        setScheduleData(prev => ({
                            ...prev,
                            [targetKey]: { ...sourceData }
                        }));
                    }
                } catch (err) {
                    console.error("Drop failed", err);
                }
            }, [scheduleData]);

            // --- Export JPG ---
            const handleExportJPG = async () => {
                if (!window.html2canvas) {
                    alert("Image export library is loading. Please try again in 2 seconds.");
                    return;
                }
                
                const element = document.getElementById('schedule-grid-container');
                if (!element) return;

                try {
                    const scrollContainer = element.querySelector('.overflow-x-auto');
                    const contentWidth = scrollContainer ? scrollContainer.scrollWidth : element.scrollWidth;

                    const canvas = await window.html2canvas(element, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        width: contentWidth,
                        windowWidth: contentWidth,
                        onclone: (clonedDoc) => {
                            const clonedElement = clonedDoc.getElementById('schedule-grid-container');
                            if (clonedElement) {
                                clonedElement.style.overflow = 'visible';
                                clonedElement.style.width = 'fit-content';
                                
                                const innerScroll = clonedElement.querySelector('.overflow-x-auto');
                                if (innerScroll) {
                                    innerScroll.style.overflow = 'visible';
                                    innerScroll.style.width = 'fit-content';
                                }
                            }
                        }
                    });
                    
                    const image = canvas.toDataURL("image/jpeg", 0.9);
                    const link = document.createElement("a");
                    link.href = image;
                    link.download = `production_schedule_${formatDate(currentDate)}.jpg`;
                    link.click();
                } catch (err) {
                    console.error("Export failed", err);
                    alert("Failed to export image. Please try again.");
                }
            };

            // derived state
            const weekDays = getDaysOfWeek(currentDate);
            const formattedWeekDays = weekDays.map(d => ({
                fullDate: d,
                dateStr: formatDate(d),
                label: formatDisplayDate(d),
                dayName: getDayName(d)
            }));

            const getCellData = (rowId, dateStr) => {
                return scheduleData[`${rowId}_${dateStr}`] || null;
            };

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col font-sans text-gray-900">
                    
                    {/* Top Header */}
                    <header className="bg-white border-b border-gray-200 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <Calendar className="w-5 h-5 text-white" />
                                </div>
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight">Cleanroom Production Schedule</h1>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={handleExportJPG}
                                    className="flex items-center px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-sm transition-colors"
                                    title="Download as JPG Image"
                                >
                                    <ImageIcon className="w-4 h-4 mr-2 text-blue-600" />
                                    Export JPG
                                </button>
                                <button 
                                    onClick={handleOpenAddRow}
                                    className="flex items-center px-3 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-sm transition-colors"
                                >
                                    <PlusCircle className="w-4 h-4 mr-2" />
                                    Add Line
                                </button>
                                <div className="h-6 w-px bg-gray-300"></div>
                                <div className="flex items-center bg-gray-100 rounded-lg p-1">
                                    <button onClick={handlePrevWeek} className="p-1 hover:bg-white rounded-md shadow-sm transition-all text-gray-600">
                                        <ChevronLeft className="w-5 h-5" />
                                    </button>
                                    <div className="px-4 font-medium text-sm text-gray-700 min-w-[140px] text-center">
                                        Week of {formattedWeekDays[0]?.label}
                                    </div>
                                    <button onClick={handleNextWeek} className="p-1 hover:bg-white rounded-md shadow-sm transition-all text-gray-600">
                                        <ChevronRight className="w-5 h-5" />
                                    </button>
                                </div>
                                <button onClick={handleToday} className="text-sm text-blue-600 font-medium hover:underline">
                                    Jump to Today
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        
                        <div id="schedule-grid-container" className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden min-h-[400px]">
                            <div className="overflow-x-auto">
                                <div className="min-w-[1000px]">
                                    {/* Grid Header */}
                                    <div className="grid grid-cols-[150px_repeat(5,_1fr)] bg-gray-50 border-b border-gray-200">
                                        <div className="p-4 flex items-end font-semibold text-gray-500 text-sm border-r border-gray-200">
                                            Room / Day
                                        </div>
                                        {formattedWeekDays.map((day) => (
                                            <div key={day.dateStr} className="p-3 border-r border-gray-200 last:border-r-0 text-center">
                                                <div className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">{day.dayName}</div>
                                                <div className="text-lg font-bold text-gray-900">{day.label}</div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Grid Body */}
                                    {rows.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-20 text-gray-500">
                                            <div className="bg-gray-100 p-4 rounded-full mb-4">
                                                <PlusCircle className="w-8 h-8 text-gray-400" />
                                            </div>
                                            <h3 className="text-lg font-medium text-gray-900">No lines added yet</h3>
                                            <p className="max-w-xs text-center mt-1">Start by clicking the "Add Line" button to create rows for your schedule.</p>
                                            <button 
                                                onClick={handleOpenAddRow}
                                                className="mt-4 px-4 py-2 text-sm font-medium text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-md transition-colors"
                                            >
                                                Add your first line
                                            </button>
                                        </div>
                                    ) : (
                                        <div>
                                            {rows.map((row) => (
                                                <div key={row.id} className="grid grid-cols-[150px_repeat(5,_1fr)] border-b border-gray-200 last:border-b-0 hover:bg-gray-50">
                                                    {/* Row Label */}
                                                    <div className="p-4 border-r border-gray-200 bg-gray-50/50 font-semibold text-sm text-gray-700 flex items-center group relative">
                                                        <span className="flex-1 mr-8">{row.label}</span>
                                                        
                                                        <div className="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 flex items-center gap-1 transition-opacity bg-gray-50 pl-2">
                                                            <button 
                                                                type="button"
                                                                onClick={(e) => handleOpenEditRow(e, row)}
                                                                className="p-1.5 hover:bg-blue-100 rounded text-gray-400 hover:text-blue-600 transition-colors focus:opacity-100 focus:outline-none"
                                                                title="Edit Room Name"
                                                            >
                                                                <Pencil className="w-3.5 h-3.5" />
                                                            </button>
                                                            <button 
                                                                type="button"
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setRowModalState({
                                                                        isOpen: true,
                                                                        mode: 'edit',
                                                                        rowId: row.id,
                                                                        initialLabel: row.label
                                                                    });
                                                                }}
                                                                className="p-1.5 hover:bg-red-100 rounded text-gray-400 hover:text-red-600 transition-colors focus:opacity-100 focus:outline-none"
                                                                title="Delete Row"
                                                            >
                                                                <Trash2 className="w-3.5 h-3.5" />
                                                            </button>
                                                        </div>
                                                    </div>

                                                    {/* Cells */}
                                                    {formattedWeekDays.map((day) => {
                                                        const data = getCellData(row.id, day.dateStr);
                                                        const isDragOver = dragOverCell && 
                                                                        dragOverCell.rowId === row.id && 
                                                                        dragOverCell.dateStr === day.dateStr;

                                                        return (
                                                            <ScheduleCell 
                                                                key={`${row.id}_${day.dateStr}`}
                                                                rowId={row.id}
                                                                dateStr={day.dateStr}
                                                                data={data}
                                                                onClick={() => handleCellClick(row.id, day.dateStr)}
                                                                onDragStart={handleDragStart}
                                                                onDrop={handleDrop}
                                                                onDragOver={handleDragOver}
                                                                onDragEnter={handleDragEnter}
                                                                onDragLeave={handleDragLeave}
                                                                isDragOver={isDragOver}
                                                            />
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="mt-4 text-xs text-gray-400 text-center flex justify-center gap-4">
                            <span>Tip: Drag and drop cards to copy them to other days.</span>
                            <span>•</span>
                            <span>Click "Export JPG" to save an image of the current week.</span>
                        </div>
                    </main>

                    {/* Modals */}
                    <EditModal
                        isOpen={modalState.isOpen}
                        onClose={() => setModalState({ ...modalState, isOpen: false })}
                        onSave={handleSaveEntry}
                        onDelete={handleDeleteEntry}
                        initialData={modalState.isOpen ? getCellData(modalState.rowId, modalState.dateStr) : null}
                        dateLabel={modalState.dateStr}
                        roomLabel={rows.find(r => r.id === modalState.rowId)?.label}
                    />
                    
                    <RowModal 
                        isOpen={rowModalState.isOpen}
                        onClose={() => setRowModalState(prev => ({ ...prev, isOpen: false }))}
                        onSave={handleSaveRow}
                        onDelete={handleDeleteRow}
                        initialLabel={rowModalState.initialLabel}
                        mode={rowModalState.mode}
                    />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
